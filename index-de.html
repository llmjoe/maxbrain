  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --bg-subtle: #f5f6f8;
      --bg-card: #f9f9fb;
      --ink: #0d0d0d;
      --ink-mid: #555560;
      --ink-faint: #9999a8;
      --accent: oklch(52% 0.18 230);
      --accent-light: oklch(95% 0.05 230);
      --rule: #e8e8ee;
      --dark: #111115;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }
    html { background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 16px; }
    body { min-height: 100vh; }
    #root { min-height: 100vh; }
    ::selection { background: var(--accent-light); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentHue": 230,
      "serifFont": "DM Serif Display"
    }/*EDITMODE-END*/;

    // ── DATEN ────────────────────────────────────────────────────────────────

    const ANALYSEN = [
      {
        id: 1,
        slug: "wind-solar-grundlast",
        date: "Apr. 2026",
        tag: "Energiewende",
        title: "Wind und Solar reichen nicht aus",
        subtitle: "Über die Lücke zwischen installierter Kapazität und gesicherter Grundlast in der deutschen Energiewende.",
        chart: { type: "bar", label: "Erneuerbarer Anteil an der Nachfrage, Winterwochen 2019–2024", data: [28,34,19,42,31,15,38,22,47,29,18,51,36,24,44], threshold: 30, unit: "%" },
        readTime: "9 Min.",
        sections: [
          { title: "Die Kapazitätsillusion", body: "Deutschlands Ausbau erneuerbarer Energien ist einer der ambitioniertesten weltweit. Im Jahr 2025 entfallen bereits über 60 % der installierten Kapazität auf Wind und Solar — eine Zahl, die in offiziellen Fortschrittsberichten prominent erscheint. Was dabei weniger Aufmerksamkeit bekommt: der Unterschied zwischen Nennleistung und dem, was in entscheidenden Momenten tatsächlich durch das Netz fließt.\n\nInstallierte Kapazität ist ein Bestand. Was das Netz braucht, ist ein Fluss — verlässliche Megawattstunden zu jeder Stunde. An einem stillen, bedeckten Winterabend produzieren 100 GW installierte Wind- und Solarleistung nahezu nichts. Das Netz interessiert sich nicht für theoretisches Potenzial." },
          { title: "Die Dunkelflaute messen", body: "Diese Analyse schlüsselt stündliche Erzeugungsdaten von ENTSO-E für 2019–2024 auf und isoliert Wochen, in denen die mittlere Windgeschwindigkeit unter 4 m/s und die Solarstrahlung unter 50 W/m² lagen — Bedingungen, die pro Winter etwa 12–18 Mal auftreten.\n\nIn diesen Perioden fallen erneuerbare Energien regelmäßig unter 30 % der Nachfrage. Die Lücke wird durch Gas (vor allem), Steinkohle (rückläufig, aber noch bedeutsam) und Importe aus dem französischen Kernkraftpark gedeckt." },
          { title: "Die Speicherlücke", body: "Die politische Standardantwort verweist auf Batteriespeicher. Deutschlands netzgekoppelte Speicherkapazität liegt aktuell bei etwa 4 GWh — genug für rund 12 Minuten des nationalen Bedarfs. Selbst optimistischste Ausbauszenarien prognostizieren bis 2035 80–100 GWh, was einige Stunden abdeckt, aber keine mehrtägige Dunkelflaute.\n\nLangzeitspeicher (Wasserstoff, Pumpspeicher) wäre die ehrliche Antwort — aber weder Kostenkurven noch regulatorische Rahmenbedingungen sind auf dem Weg, vor 2035 nennenswerte Größenordnungen zu erreichen." },
          { title: "Was sich ändern muss", body: "Der Kohleausstieg ist gesetzlich für 2038 festgelegt, mit einem vorgezogenen freiwilligen Ziel von 2030. Die Ausbaustrategie für netzgekoppelte Speicher kreuzt sich mit der Versorgungslücke frühestens 2032 — unter aktuellen Politikannahmen.\n\nDie unbequeme Arithmetik lässt drei Optionen: den Kohleausstieg verschieben, den Speicherausbau um eine Größenordnung beschleunigen oder strukturelle Importabhängigkeit von Nachbarnetzen akzeptieren. Die aktuelle Politik bekennt sich offiziell zu keiner davon — was selbst eine politische Entscheidung ist." }
        ]
      },
      {
        id: 2,
        slug: "vermoegen-ungleichheit-deutschland",
        date: "März 2026",
        tag: "Wirtschaft & Ungleichheit",
        title: "Die Vermögenslücke wächst — auch nach der Wiedervereinigung",
        subtitle: "Eine genaue Betrachtung der Nettovermögensverteilung zwischen Ost und West, 35 Jahre danach.",
        chart: { type: "diverging", label: "Nettovermögenslücke Ost–West nach Alterskohorte (Tsd. €)", data: [-41,-38,-52,-65,-78,-89,-95], labels: ["<30","30er","40er","50er","60er","70er","80+"], unit: "Tsd. €" },
        readTime: "12 Min.",
        sections: [
          { title: "Das hartnäckige Gefälle", body: "Die Erzählung von der deutschen Wiedervereinigung als wirtschaftlichem Erfolg stimmt im Aggregat und ist auf Haushaltsebene irreführend. Das BIP pro Kopf in den östlichen Bundesländern hat sich seit 1990 deutlich angeglichen. Das Nettovermögen der Haushalte nicht.\n\nAuf Grundlage der vierten Welle der EZB-Haushaltsbefragung (HFCS) und des SOEP 2023 bilde ich Nettovermögens-Perzentile nach Bundesländern ab. Das Bild ist eindeutig: Ostdeutsche Haushalte verfügen im Median über etwa 40 % des Nettovermögens ihrer westdeutschen Pendants." },
          { title: "Warum Einkommenskonvergenz nicht reicht", body: "Das Problem liegt nicht im Einkommen — sondern im Vermögensbesitz. Die Lohnlücke zwischen Ost und West hat sich seit 2000 deutlich verringert. Die Vermögenslücke nicht. Der entscheidende Faktor ist Immobilieneigentum: Im Westen entstand Mittelschichtsvermögen über Jahrzehnte der Nachkriegszeit. Im Osten wurde Privateigentum durch die Wiedervereinigungsprivatisierung überwiegend an westdeutsche Investoren übertragen, nicht an ostdeutsche Bewohner." },
          { title: "Der Erbschaftsmechanismus", body: "Erbschaften sind der Mechanismus, durch den ein einmaliger Verteilungsschock dauerhaft wird. Jede Generation im Westen startet mit einem Vorsprung — nicht weil sie mehr verdient, sondern weil sie mehr erbt. SOEP-Daten zeigen: Die Erbschaftsquote in ostdeutschen Bundesländern ist um etwa 40 % niedriger, der mittlere Erbschaftswert um rund 55 % geringer als im Westen." },
          { title: "Was die Politik leisten kann", body: "Die Lücke allein durch Einkommenspolitik zu schließen ist rechnerisch innerhalb einer Generation nicht realistisch. Das Gefälle ist ein Bestandsproblem; Löhne sind ein Strominstrument. Die Hebel, die tatsächlich etwas bewegen könnten — Erbschaftsbesteuerung, regionale Investitionsförderung, sozialer Wohnungsbau im großen Maßstab — sind genau diejenigen, die auf den stärksten politischen Widerstand stoßen." }
        ]
      },
      {
        id: 3,
        slug: "co2-preis-verteilung",
        date: "Jan. 2026",
        tag: "Wirtschaft & Ungleichheit",
        title: "Wer zahlt den CO₂-Preis wirklich?",
        subtitle: "Verteilungswirkungen des nationalen Emissionshandels auf die Haushaltsenergieausgaben.",
        chart: { type: "bar", label: "nEHS-Belastung als % des Nettoeinkommens, nach Quintil", data: [2.8,1.9,1.4,1.0,0.7], labels: ["Q1","Q2","Q3","Q4","Q5"], threshold: null, unit: "%" },
        readTime: "8 Min.",
        sections: [
          { title: "Das Instrument", body: "Deutschland führte 2021 einen nationalen CO₂-Preis (nEHS) ein, der Heizöl, Gas und Kraftstoffe außerhalb des EU-ETS erfasst. Startend bei 25 €/tCO₂ ist er auf 50 € (2024) gestiegen und soll bis 2026 auf 65 € steigen.\n\nDie Einnahmen — etwa 10 Milliarden Euro pro Jahr bei aktuellen Preisen — sind nominell für Klimamaßnahmen und eine Pro-Kopf-Rückerstattung (Klimageld) vorgesehen. In der Praxis wurde das Klimageld bislang nicht ausgezahlt." },
          { title: "Die Belastung schätzen", body: "Auf Basis von Einkommensquintil-Ausgabedaten aus der EVS 2022 schätze ich die nEHS-Kostenbelastung als Anteil am Nettohaushaltseinkommen. Das unterste Quintil zahlt einen effektiven Satz von 2,8 % des Nettoeinkommens. Das oberste Quintil zahlt 0,7 %. Das Regressivitätsverhältnis von 4:1 ist größer als bei vergleichbaren CO₂-Preisanalysen in anderen europäischen Ländern." },
          { title: "Warum Deutschland regressiver ist", body: "Zwei Faktoren machen Deutschlands Verteilungsprofil besonders ausgeprägt. Erstens haben einkommensschwache Haushalte in Deutschland eine ungewöhnlich hohe Abhängigkeit von Heizöl — ältere, schlechter gedämmte Gebäude in ländlichen Ostgebieten dominieren das unterste Quintil. Zweitens sind ÖPNV-Alternativen zum Pendeln mit dem Auto außerhalb der großen Städte schwächer." },
          { title: "Das Designproblem", body: "Einnahmenrückgabe ist nicht verteilungsneutral, wenn die Steuerbasis selbst stark auf einkommensschwache Haushalte konzentriert ist. Das politische Designproblem ist real und bekannt. Es ist kein technisches Problem. Die technischen Lösungen existieren. Es ist ein politökonomisches Problem: Die Haushalte, die am meisten zahlen, haben am wenigsten Einfluss darauf, wie die Einnahmen verwendet werden." }
        ]
      }
    ];

    const CV = {
      intro: "Ich analysiere die Ökonomie der deutschen Energiewende und persistente Ungleichheit — auf Grundlage öffentlich zugänglicher Daten, offener Methoden und einem grundsätzlichen Skeptizismus gegenüber offiziellen Narrativen.",
      sections: [
        { title: "Ausbildung", entries: [
          { period: "2022 – 2024", role: "M.Sc. Wirtschaftswissenschaften", org: "Humboldt-Universität zu Berlin", detail: "Schwerpunkt: Empirische Wirtschaftsforschung, Arbeitsmarkt und Ungleichheit" },
          { period: "2018 – 2022", role: "B.Sc. Volkswirtschaftslehre", org: "Universität Mannheim", detail: "Bachelorarbeit: Regressive Wirkungen des Emissionshandels auf einkommensschwache Haushalte" }
        ]},
        { title: "Berufserfahrung", entries: [
          { period: "2024 – heute", role: "Freier Analyst & Autor", org: "Selbstständig · Berlin", detail: "Datenanalysen zur Energiewende und wirtschaftlicher Ungleichheit. Publikation auf dieser Seite." },
          { period: "2023 – 2024", role: "Wissenschaftliche Hilfskraft", org: "DIW Berlin", detail: "Mitarbeit an Projekten zur Vermögensverteilung und Haushaltsdaten (SOEP)." },
          { period: "2021 – 2022", role: "Praktikant Wirtschaftspolitik", org: "Agora Energiewende · Berlin", detail: "Recherche und Datenauswertung zu Netzkosten und Lastmanagement." }
        ]},
        { title: "Kenntnisse & Methoden", entries: [
          { period: "Statistik", role: "R, Python (pandas, statsmodels), Stata", org: "", detail: "Regressionsanalyse, Kausalinferenz, maschinelles Lernen (Causal Forests)" },
          { period: "Datenquellen", role: "SOEP, EVS, ENTSO-E, Destatis, Eurostat", org: "", detail: "Mikrodaten, Haushaltspanels, Energiemarktdaten" },
          { period: "Sprachen", role: "Deutsch (Muttersprache), Englisch (fließend), Portugiesisch (konversationssicher)", org: "", detail: "" }
        ]}
      ]
    };

    // ── CHART THUMB ───────────────────────────────────────────────────────────

    function ChartThumb({ chart }) {
      const w = 400, h = 220;
      const accent = "var(--accent)";
      if (chart.type === "bar") {
        const max = Math.max(...chart.data);
        const bw = Math.floor((w - 20) / chart.data.length) - 3;
        return (
          <svg viewBox={`0 0 ${w} ${h}`} width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
            <rect width={w} height={h} fill="var(--bg-subtle)" />
            {chart.data.map((v, i) => {
              const bh = (v / max) * (h - 24);
              const isBelow = chart.threshold && v < chart.threshold;
              return <rect key={i} x={10 + i * (bw + 3)} y={h - bh - 12} width={bw} height={bh} rx="2" fill={isBelow ? "#e05a3a" : accent} opacity="0.8" />;
            })}
          </svg>
        );
      }
      if (chart.type === "diverging") {
        const max = Math.max(...chart.data.map(Math.abs));
        const bw = Math.floor((w - 20) / chart.data.length) - 4;
        return (
          <svg viewBox={`0 0 ${w} ${h}`} width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
            <rect width={w} height={h} fill="var(--bg-subtle)" />
            {chart.data.map((v, i) => {
              const bh = (Math.abs(v) / max) * (h - 24);
              return <rect key={i} x={10 + i * (bw + 4)} y={12} width={bw} height={bh} rx="2" fill="#e05a3a" opacity="0.75" />;
            })}
          </svg>
        );
      }
      return <div style={{ width: "100%", height: "100%", background: "var(--bg-subtle)" }}></div>;
    }

    // ── MINI CHART (artikel seite) ────────────────────────────────────────────

    function MiniChart({ chart, expanded }) {
      if (chart.type === "bar") {
        const max = Math.max(...chart.data);
        return (
          <div style={{ marginTop: expanded ? 0 : 0 }}>
            <div style={{ fontSize: 11, color: "var(--ink-faint)", marginBottom: 8, fontFamily: "var(--sans)", letterSpacing: "0.04em", textTransform: "uppercase" }}>{chart.label}</div>
            <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: expanded ? 90 : 52 }}>
              {chart.data.map((v, i) => {
                const isBelow = chart.threshold && v < chart.threshold;
                return (
                  <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                    <div style={{ width: "100%", height: `${(v / max) * (expanded ? 90 : 52)}px`, background: isBelow ? "#e05a3a" : "var(--accent)", opacity: expanded ? 0.85 : 0.65, borderRadius: "2px 2px 0 0" }}></div>
                    {chart.labels && expanded && <div style={{ fontSize: 9, color: "var(--ink-faint)" }}>{chart.labels[i]}</div>}
                  </div>
                );
              })}
            </div>
            {chart.threshold && expanded && (
              <div style={{ fontSize: 11, color: "var(--ink-mid)", marginTop: 8 }}>
                <span style={{ display: "inline-block", width: 10, height: 10, background: "#e05a3a", borderRadius: 2, marginRight: 4, verticalAlign: "middle" }}></span>
                Unter {chart.threshold}{chart.unit} Schwellenwert
              </div>
            )}
          </div>
        );
      }
      if (chart.type === "diverging") {
        const minV = Math.min(...chart.data);
        return (
          <div>
            <div style={{ fontSize: 11, color: "var(--ink-faint)", marginBottom: 8, fontFamily: "var(--sans)", letterSpacing: "0.04em", textTransform: "uppercase" }}>{chart.label}</div>
            <div style={{ display: "flex", alignItems: "flex-start", gap: 4 }}>
              {chart.data.map((v, i) => (
                <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                  <div style={{ width: "100%", height: `${Math.abs(v) / Math.abs(minV) * (expanded ? 80 : 48)}px`, background: "#e05a3a", opacity: expanded ? 0.8 : 0.55, borderRadius: "0 0 2px 2px" }}></div>
                  {expanded && <div style={{ fontSize: 9, color: "var(--ink-faint)", marginTop: 2 }}>{chart.labels[i]}</div>}
                </div>
              ))}
            </div>
          </div>
        );
      }
      return null;
    }

    // ── ARTIKEL TOC SIDEBAR ───────────────────────────────────────────────────

    function ArtikelTOC({ article, activeSection, onJump, onBack, serifFont }) {
      return (
        <div style={{ width: 200, flexShrink: 0, position: "sticky", top: 68, alignSelf: "flex-start", maxHeight: "calc(100vh - 90px)", overflowY: "auto", scrollbarWidth: "none" }}>
          <button onClick={onBack} style={{ background: "none", border: "none", fontFamily: "var(--sans)", fontSize: 12, color: "var(--ink-faint)", cursor: "pointer", padding: 0, display: "flex", alignItems: "center", gap: 5, marginBottom: 32, transition: "color 0.2s" }}
            onMouseEnter={e => e.currentTarget.style.color = "var(--ink)"}
            onMouseLeave={e => e.currentTarget.style.color = "var(--ink-faint)"}>
            ← Alle Analysen
          </button>
          <div style={{ fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--ink-faint)", fontWeight: 600, fontFamily: "var(--sans)", marginBottom: 16 }}>In diesem Artikel</div>
          <button onClick={() => onJump("section-chart")} style={{ background: "none", border: "none", textAlign: "left", cursor: "pointer", padding: "8px 0 8px 14px", display: "block", width: "100%", borderLeft: activeSection === "chart" ? "2px solid var(--accent)" : "2px solid var(--rule)", transition: "border-color 0.2s" }}
            onMouseEnter={e => { if (activeSection !== "chart") e.currentTarget.style.borderLeftColor = "var(--ink-faint)"; }}
            onMouseLeave={e => { if (activeSection !== "chart") e.currentTarget.style.borderLeftColor = "var(--rule)"; }}>
            <div style={{ fontSize: 9, color: "var(--ink-faint)", marginBottom: 2, letterSpacing: "0.04em" }}>00</div>
            <div style={{ fontSize: 12, lineHeight: 1.4, fontFamily: "var(--sans)", color: activeSection === "chart" ? "var(--ink)" : "var(--ink-mid)", fontWeight: activeSection === "chart" ? 500 : 400 }}>Kerndiagramm</div>
          </button>
          {article.sections.map((s, i) => {
            const isActive = activeSection === i;
            return (
              <button key={i} onClick={() => onJump(`section-${i}`)} style={{ background: "none", border: "none", textAlign: "left", cursor: "pointer", padding: "8px 0 8px 14px", display: "block", width: "100%", borderLeft: isActive ? "2px solid var(--accent)" : "2px solid var(--rule)", transition: "border-color 0.2s" }}
                onMouseEnter={e => { if (!isActive) e.currentTarget.style.borderLeftColor = "var(--ink-faint)"; }}
                onMouseLeave={e => { if (!isActive) e.currentTarget.style.borderLeftColor = "var(--rule)"; }}>
                <div style={{ fontSize: 9, color: "var(--ink-faint)", marginBottom: 2, letterSpacing: "0.04em" }}>{String(i + 1).padStart(2, "0")}</div>
                <div style={{ fontSize: 12, lineHeight: 1.4, fontFamily: "var(--sans)", color: isActive ? "var(--ink)" : "var(--ink-mid)", fontWeight: isActive ? 500 : 400, textWrap: "pretty" }}>{s.title}</div>
              </button>
            );
          })}
          <div style={{ marginTop: 24, height: 2, background: "var(--rule)", borderRadius: 1 }}>
            <div style={{ height: "100%", borderRadius: 1, background: "var(--accent)", width: activeSection === "chart" ? "5%" : typeof activeSection === "number" ? `${((activeSection + 1) / article.sections.length) * 100}%` : "0%", transition: "width 0.4s ease" }}></div>
          </div>
        </div>
      );
    }

    // ── ARTIKEL SEITE ─────────────────────────────────────────────────────────

    function ArtikelSeite({ article, serifFont, onBack }) {
      const [activeSection, setActiveSection] = useState("chart");
      useEffect(() => { window.scrollTo({ top: 0 }); setActiveSection("chart"); }, [article.id]);
      useEffect(() => {
        const targets = [];
        const chartEl = document.getElementById("section-chart");
        if (chartEl) targets.push({ el: chartEl, key: "chart" });
        article.sections.forEach((_, i) => {
          const el = document.getElementById(`section-${i}`);
          if (el) targets.push({ el, key: i });
        });
        const obs = new IntersectionObserver(entries => {
          entries.forEach(entry => { if (entry.isIntersecting) { const f = targets.find(t => t.el === entry.target); if (f) setActiveSection(f.key); } });
        }, { rootMargin: "-20% 0px -60% 0px", threshold: 0 });
        targets.forEach(t => obs.observe(t.el));
        return () => obs.disconnect();
      }, [article.id]);
      function scrollToId(id) {
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 80, behavior: "smooth" });
      }
      return (
        <div style={{ animation: "fadeUp 0.25s ease", minHeight: "100vh", background: "#fff" }}>
          <style>{`@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }`}</style>
          <div style={{ position: "sticky", top: 0, zIndex: 100, background: "#fff", borderBottom: "1px solid var(--rule)", padding: "0 clamp(20px,4vw,48px)" }}>
            <div style={{ maxWidth: 1100, margin: "0 auto", height: 56, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ width: 26, height: 26, borderRadius: "50%", background: "var(--accent)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <span style={{ color: "#fff", fontSize: 11, fontWeight: 700 }}>M</span>
                </div>
                <span style={{ fontFamily: "var(--sans)", fontWeight: 600, fontSize: 13, color: "var(--ink)" }}>Max Staib Ramalho</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                <span style={{ fontFamily: "var(--sans)", fontSize: 11, color: "var(--ink-faint)", letterSpacing: "0.06em", textTransform: "uppercase" }}>{article.tag}</span>
                <span style={{ fontFamily: "var(--sans)", fontSize: 12, color: "var(--ink-faint)" }}>{article.readTime} Lesezeit</span>
              </div>
            </div>
          </div>
          <div style={{ maxWidth: 1100, margin: "0 auto", padding: "48px clamp(20px,4vw,48px) 120px", display: "flex", gap: "clamp(40px,5vw,80px)", alignItems: "flex-start" }}>
            <ArtikelTOC article={article} activeSection={activeSection} onJump={scrollToId} onBack={onBack} serifFont={serifFont} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ marginBottom: 48 }}>
                <span style={{ fontSize: 10, fontFamily: "var(--sans)", letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--accent)", fontWeight: 600 }}>{article.date}</span>
                <h1 style={{ fontFamily: `'${serifFont}', Georgia, serif`, fontSize: "clamp(28px,4vw,48px)", fontWeight: 400, lineHeight: 1.06, margin: "14px 0 18px", textWrap: "balance" }}>{article.title}</h1>

    function interpolateColor(value, low, high, colorA, colorB) {
      const t = Math.max(0, Math.min(1, (value - low) / (high - low)));
      return t;
    }

    function getColor(t, scheme) {
      if (scheme === "blue") {
        const r = Math.round(235 - t * 180);
        const g = Math.round(240 - t * 160);
        const b = Math.round(255 - t * 80);
        return `rgb(${r},${g},${b})`;
      }
      if (scheme === "green") {
        const r = Math.round(220 - t * 160);
        const g = Math.round(245 - t * 100);
        const b = Math.round(220 - t * 160);
        return `rgb(${r},${g},${b})`;
      }
      // warm orange-red
      const r = Math.round(255 - t * 30);
      const g = Math.round(240 - t * 170);
      const b = Math.round(220 - t * 200);
      return `rgb(${r},${g},${b})`;
    }

            <div style={{ display: "flex", gap: 28, alignItems: "center" }}>
              {[["Analysen","analysen"],["Karten","karten"],["Über mich","ueber"],["Lebenslauf","lebenslauf"]].map(([label, id]) => (
                <button key={id} onClick={() => onScrollTo(id)} style={{ background: "none", border: "none", fontFamily: "var(--sans)", fontSize: 13, cursor: "pointer", color: "var(--ink-mid)", padding: 0, transition: "color 0.2s" }}
                  onMouseEnter={e => e.target.style.color = "var(--ink)"}
                  onMouseLeave={e => e.target.style.color = "var(--ink-mid)"}>
                  {label}
                </button>
              ))}
            </div>
          </div>
        </nav>
      );
    }

    // ── APP ───────────────────────────────────────────────────────────────────

    function App() {
      const [currentArticle, setCurrentArticle] = useState(null);
      const [activeFilter, setActiveFilter] = useState("Alle");
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      useEffect(() => {
        document.documentElement.style.setProperty("--accent", `oklch(52% 0.18 ${tweaks.accentHue})`);
        document.documentElement.style.setProperty("--accent-light", `oklch(95% 0.06 ${tweaks.accentHue})`);
      }, [tweaks.accentHue]);

      const serifFont = tweaks.serifFont;

      function scrollTo(id) {
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 68, behavior: "smooth" });
      }

      if (currentArticle) {
        return (
          <>
            <ArtikelSeite article={currentArticle} serifFont={serifFont} onBack={() => { setCurrentArticle(null); window.scrollTo({ top: 0 }); }} />
            <TweaksPanel>
              <TweakSection title="Akzentfarbe"><TweakSlider id="accentHue" label="Farbton" min={0} max={360} step={1} tweaks={tweaks} setTweak={setTweak} /></TweakSection>
              <TweakSection title="Typografie"><TweakSelect id="serifFont" label="Schrift" tweaks={tweaks} setTweak={setTweak} options={[{value:"DM Serif Display",label:"DM Serif Display"},{value:"Georgia",label:"Georgia"},{value:"Palatino Linotype",label:"Palatino"}]} /></TweakSection>
            </TweaksPanel>
          </>
        );
      }

      const tags = ["Alle", ...Array.from(new Set(ANALYSEN.map(a => a.tag)))];
      const filtered = activeFilter === "Alle" ? ANALYSEN : ANALYSEN.filter(a => a.tag === activeFilter);
      const hero = filtered[0];
      const rest = filtered.slice(1);

      return (
        <div style={{ minHeight: "100vh", background: "#fff" }}>
          <Nav onScrollTo={scrollTo} />

          {/* ANALYSEN */}
          <section id="analysen" style={{ padding: "clamp(40px,5vw,64px) clamp(20px,5vw,64px)" }}>
            <div style={{ maxWidth: 1100, margin: "0 auto" }}>
              <h1 style={{ fontFamily: `'${serifFont}', Georgia, serif`, fontSize: "clamp(28px,4vw,42px)", fontWeight: 400, color: "var(--ink)", marginBottom: 28 }}>Aktuelle Analysen</h1>

              {/* Pill filter */}
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 36 }}>
                {tags.map(tag => (
                  <button key={tag} onClick={() => setActiveFilter(tag)} style={{
                    background: activeFilter === tag ? "var(--ink)" : "transparent",
                    color: activeFilter === tag ? "#fff" : "var(--ink-mid)",
                    border: `1px solid ${activeFilter === tag ? "var(--ink)" : "var(--rule)"}`,
                    borderRadius: 999, padding: "6px 18px",
                    fontFamily: "var(--sans)", fontSize: 13, cursor: "pointer",
                    transition: "all 0.15s"
                  }}>{tag}</button>
                ))}
              </div>

              {/* Hero */}
              {hero && <div style={{ marginBottom: 24 }}><HeroKarte article={hero} serifFont={serifFont} onOpen={() => { setCurrentArticle(hero); window.scrollTo({ top: 0 }); }} /></div>}

              {/* Grid */}
              {rest.length > 0 && (
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 20 }}>
                  {rest.map(a => <GridKarte key={a.id} article={a} serifFont={serifFont} onOpen={() => { setCurrentArticle(a); window.scrollTo({ top: 0 }); }} />)}
                </div>
              )}
            </div>
          </section>

          {/* KARTEN */}
          <DeutschlandKarte />

          {/* ÜBER MICH */}
          <section id="ueber" style={{ padding: "clamp(48px,6vw,80px) clamp(20px,5vw,64px)", background: "#fff", borderTop: "1px solid var(--rule)" }}>
            <div style={{ maxWidth: 1100, margin: "0 auto", display: "grid", gridTemplateColumns: "200px 1fr", gap: "clamp(32px,4vw,64px)", alignItems: "start" }}>
              <div>
                <div style={{ width: "100%", aspectRatio: "3/4", borderRadius: 10, overflow: "hidden", border: "1px solid var(--rule)" }}>
                  <img src="uploads/2026_LBD_Portraits_Max SR_1778_unbearbeitet.jpg" alt="Max Staib Ramalho" style={{ width: "100%", height: "100%", objectFit: "cover", objectPosition: "center top", display: "block" }} />
                </div>
              </div>
              <div style={{ paddingTop: 4 }}>
                <span style={{ fontSize: 10, fontFamily: "var(--sans)", letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--accent)", fontWeight: 600 }}>Über mich</span>
                <h2 style={{ fontFamily: `'${serifFont}', Georgia, serif`, fontSize: "clamp(26px,3.5vw,38px)", fontWeight: 400, lineHeight: 1.15, margin: "14px 0 22px" }}>Max Staib Ramalho</h2>
                <div style={{ display: "flex", flexDirection: "column", gap: 14, maxWidth: 560 }}>
                  {[
                    "Ich analysiere die Ökonomie der deutschen Energiewende und die Persistenz von Ungleichheit — auf Grundlage öffentlich zugänglicher Daten, offener Methoden und einem grundsätzlichen Skeptizismus gegenüber offiziellen Narrativen.",
                    "Meine Arbeit stützt sich auf Mikrodaten (SOEP, EVS, ENTSO-E, Destatis) und fragt nach Verteilungswirkungen: Wer trägt die Kosten, wer profitiert — und welche politischen Entscheidungen bestimmen das Ergebnis?",
                    "Ich lebe in Berlin. Bei Interesse an meiner Arbeit oder einer Zusammenarbeit freue ich mich über eine Nachricht."
                  ].map((t, i) => <p key={i} style={{ fontFamily: "var(--sans)", fontSize: 15, lineHeight: 1.75, color: "var(--ink-mid)", textWrap: "pretty" }}>{t}</p>)}
                </div>
                <div style={{ marginTop: 28, display: "flex", gap: 10 }}>
                  {["E-Mail","LinkedIn","GitHub"].map(l => (
                    <a key={l} href="#" style={{ fontFamily: "var(--sans)", fontSize: 13, color: "#fff", textDecoration: "none", background: "var(--ink)", borderRadius: 999, padding: "8px 18px", transition: "background 0.2s" }}
                      onMouseEnter={e => e.target.style.background = "var(--accent)"}
                      onMouseLeave={e => e.target.style.background = "var(--ink)"}>
                      {l}
                    </a>
                  ))}
                </div>
              </div>
            </div>
          </section>

          {/* LEBENSLAUF */}
          <Lebenslauf serifFont={serifFont} />

          {/* FOOTER */}
          <footer style={{ background: "var(--dark)", padding: "52px clamp(20px,5vw,64px) 32px" }}>
            <div style={{ maxWidth: 1100, margin: "0 auto" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 48, flexWrap: "wrap", gap: 32 }}>
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                    <div style={{ width: 28, height: 28, borderRadius: "50%", background: "var(--accent)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <span style={{ color: "#fff", fontSize: 12, fontWeight: 700 }}>M</span>
                    </div>
                    <span style={{ fontFamily: "var(--sans)", fontWeight: 600, fontSize: 14, color: "#fff" }}>Max Staib Ramalho</span>
                  </div>
                  <p style={{ fontFamily: "var(--sans)", fontSize: 13, color: "#888", lineHeight: 1.6, maxWidth: 260 }}>Datenanalyse zur deutschen Energiewende und wirtschaftlicher Ungleichheit.</p>
                </div>
                <div style={{ display: "flex", gap: 48 }}>
                  <div>
                    <div style={{ fontFamily: "var(--sans)", fontSize: 11, color: "#444", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 14 }}>Navigation</div>
                    {[["Analysen","analysen"],["Karten","karten"],["Über mich","ueber"],["Lebenslauf","lebenslauf"]].map(([label,id]) => (
                      <div key={id} style={{ marginBottom: 10 }}>
                        <button onClick={() => scrollTo(id)} style={{ background: "none", border: "none", fontFamily: "var(--sans)", fontSize: 13, color: "#888", cursor: "pointer", padding: 0, transition: "color 0.2s" }}
                          onMouseEnter={e => e.target.style.color = "#fff"}
                          onMouseLeave={e => e.target.style.color = "#888"}>{label}</button>
                      </div>
                    ))}
                  </div>
                  <div>
                    <div style={{ fontFamily: "var(--sans)", fontSize: 11, color: "#444", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 14 }}>Kontakt</div>
                    {["E-Mail","LinkedIn","GitHub"].map(l => (
                      <div key={l} style={{ marginBottom: 10 }}>
                        <a href="#" style={{ fontFamily: "var(--sans)", fontSize: 13, color: "#888", textDecoration: "none", transition: "color 0.2s" }}
                          onMouseEnter={e => e.target.style.color = "#fff"}
                          onMouseLeave={e => e.target.style.color = "#888"}>{l}</a>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
              <div style={{ borderTop: "1px solid #222", paddingTop: 24, display: "flex", justifyContent: "space-between" }}>
                <span style={{ fontFamily: "var(--sans)", fontSize: 12, color: "#555" }}>© 2026 Max Staib Ramalho</span>
                <span style={{ fontFamily: "var(--sans)", fontSize: 12, color: "#555" }}>Berlin · Datenanalyse</span>
              </div>
            </div>
          </footer>

          <TweaksPanel>
            <TweakSection title="Akzentfarbe"><TweakSlider id="accentHue" label="Farbton" min={0} max={360} step={1} tweaks={tweaks} setTweak={setTweak} /></TweakSection>
            <TweakSection title="Typografie"><TweakSelect id="serifFont" label="Schrift" tweaks={tweaks} setTweak={setTweak} options={[{value:"DM Serif Display",label:"DM Serif Display"},{value:"Georgia",label:"Georgia"},{value:"Palatino Linotype",label:"Palatino"}]} /></TweakSection>
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
